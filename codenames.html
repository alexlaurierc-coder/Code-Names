<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Codenames</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#c0392b;--red-light:#e74c3c;--red-dark:#922b21;
  --blue:#2471a3;--blue-light:#3498db;--blue-dark:#1a5276;
  --neutral:#c8a96a;--neutral-dark:#a0845a;
  --assassin:#1c1c1c;
  --felt:#34495e;--board-bg:#2c3e50;
  --card-bg:#f5efe0;--card-border:#d4c5a0;
  --panel:#1a252f;--panel2:#212f3d;
}
body{font-family:'Georgia',serif;background:var(--board-bg);color:#fff;min-height:100vh;overflow-x:hidden;}

/* ===== CONNECTION ===== */
#screen-connecting{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
.connecting-dot{width:14px;height:14px;border-radius:50%;background:#f0d080;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}
.conn-msg{font-size:16px;color:#888;letter-spacing:1px;}
.conn-error{color:#ef5350;font-size:14px;max-width:360px;text-align:center;line-height:1.6;}

/* ===== LOBBY ===== */
#screen-lobby{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:20px;}
.lobby-title{font-size:52px;font-weight:bold;letter-spacing:6px;color:#f0d080;text-shadow:0 3px 10px rgba(0,0,0,0.5);text-transform:uppercase;}
.lobby-sub{font-size:13px;color:#888;letter-spacing:2px;margin-top:-14px;}
.lobby-panels{display:flex;gap:16px;width:100%;max-width:900px;}
.team-panel{flex:1;background:var(--panel);border-radius:12px;padding:16px;border:2px solid #333;}
.team-panel.rp{border-color:var(--red);} .team-panel.bp{border-color:var(--blue);}
.team-panel h3{font-size:17px;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #2a3a4a;}
.rp h3{color:var(--red-light);} .bp h3{color:var(--blue-light);}
.role-group{margin-bottom:12px;}
.role-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:6px;}
.player-slot{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;min-height:36px;margin-bottom:4px;background:#0d1520;border:1px solid #2a3a4a;font-size:13px;}
.player-slot.taken{background:#1e2a1e;border-color:#2a4a2a;}
.player-slot.taken.r{background:#2a1515;border-color:#4a2020;}
.player-slot.taken.b{background:#151a2a;border-color:#20204a;}
.slot-empty{color:#3a4a5a;font-style:italic;font-size:12px;}
.slot-you{font-size:10px;color:#666;margin-left:auto;font-style:italic;}
.op-list{display:flex;flex-wrap:wrap;gap:5px;min-height:28px;align-items:flex-start;}
.op-chip{padding:3px 10px;border-radius:20px;font-size:12px;background:#1a2530;border:1px solid #2a3540;}
.op-chip.r{background:#2a1515;border-color:#4a2020;color:#e88;}
.op-chip.b{background:#151a2a;border-color:#20204a;color:#88e;}
.join-form{background:var(--panel);border-radius:12px;padding:20px;width:100%;max-width:480px;border:1px solid #2a3a4a;}
.join-form h3{margin-bottom:16px;color:#f0d080;font-size:15px;letter-spacing:1px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.fg input[type=text]{width:100%;padding:9px 12px;background:#0d1520;border:1px solid #3a4a5a;border-radius:7px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.fg input[type=text]:focus{border-color:#f0d080;}
.pick-row{display:flex;gap:10px;}
.pick-btn{flex:1;padding:9px;border:2px solid #2a3a4a;border-radius:8px;background:#0d1520;color:#555;cursor:pointer;font-size:13px;font-family:inherit;letter-spacing:1px;transition:all 0.2s;}
.pick-btn:hover:not(:disabled){filter:brightness(1.3);}
.pick-btn:disabled{opacity:0.3;cursor:not-allowed;}
.pick-btn.ar{background:var(--red-dark);border-color:var(--red);color:#fff;}
.pick-btn.ab{background:var(--blue-dark);border-color:var(--blue);color:#fff;}
.pick-btn.an{background:#2a2a1a;border-color:#888;color:#ccc;}
.btn-join{width:100%;padding:12px;background:linear-gradient(135deg,#7a6528,#c8a840);border:none;border-radius:8px;color:#1a1a0a;font-size:15px;font-weight:bold;font-family:inherit;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:filter 0.2s;margin-top:4px;}
.btn-join:hover{filter:brightness(1.1);} .btn-join:disabled{opacity:0.4;cursor:not-allowed;}
.start-area{text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;}
.btn-start{padding:14px 50px;background:linear-gradient(135deg,#1a7040,#27ae60);border:none;border-radius:10px;color:#fff;font-size:17px;font-weight:bold;font-family:inherit;cursor:pointer;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 20px rgba(39,174,96,0.4);transition:all 0.2s;}
.btn-start:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-start:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
.start-note{font-size:12px;color:#555;}
.btn-reset-sm{padding:7px 18px;background:#111;border:1px solid #2a2a2a;border-radius:6px;color:#555;font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.2s;}
.btn-reset-sm:hover{color:#aaa;border-color:#444;}
.already-joined{font-size:13px;color:#4a8a4a;letter-spacing:1px;}

/* ===== GAME SCREEN ===== */
#screen-game{display:none;flex-direction:column;min-height:100vh;}
.score-bar{display:flex;align-items:stretch;background:var(--panel);border-bottom:2px solid #111;min-height:62px;}
.score-side{display:flex;align-items:center;flex:1;}
.score-side.rs{justify-content:flex-start;} .score-side.bs{justify-content:flex-end;}
.score-block{display:flex;align-items:center;justify-content:center;width:68px;min-height:62px;font-size:30px;font-weight:900;}
.score-block.r{background:var(--red);} .score-block.b{background:var(--blue);}
.score-lbl{font-size:11px;text-transform:uppercase;letter-spacing:2px;padding:0 14px;}
.score-lbl.rl{color:var(--red-light);} .score-lbl.bl{color:var(--blue-light);}
.turn-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 16px;min-width:200px;}
.turn-team{font-size:14px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;}
.turn-team.r{color:var(--red-light);} .turn-team.b{color:var(--blue-light);}
.turn-phase{font-size:11px;color:#666;margin-top:2px;letter-spacing:1px;}
.game-layout{flex:1;display:flex;min-height:0;}
.board-col{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--felt);}
.board{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;width:100%;max-width:840px;}
.card{aspect-ratio:1.65;display:flex;align-items:center;justify-content:center;background:var(--card-bg);border:2px solid var(--card-border);border-radius:8px;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.15s,box-shadow 0.15s;user-select:none;}
.card:hover:not(.revealed):not(.noclk){transform:scale(1.04);box-shadow:0 6px 22px rgba(0,0,0,0.45);}
.card.noclk{cursor:default;}
.card-word{font-size:clamp(10px,1.7vw,15px);font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#3a2e1a;text-align:center;padding:6px;line-height:1.2;z-index:1;}
.card-hint{position:absolute;top:5px;right:5px;width:11px;height:11px;border-radius:50%;}
.card-hint.red{background:var(--red);} .card-hint.blue{background:var(--blue);}
.card-hint.neutral{background:var(--neutral-dark);} .card-hint.assassin{background:#111;}
.card.sm-red{border-color:var(--red) !important;}
.card.sm-blue{border-color:var(--blue) !important;}
.card.sm-assassin{border-color:#555 !important;background:#222 !important;}
.card.sm-assassin .card-word{color:#666;}
.card.sm-neutral{border-color:var(--neutral) !important;}
.card.revealed{cursor:default;transform:none !important;box-shadow:none !important;}
.card.rv-red{background:var(--red);border-color:var(--red-dark);}
.card.rv-red .card-word{color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.5);}
.card.rv-blue{background:var(--blue);border-color:var(--blue-dark);}
.card.rv-blue .card-word{color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.5);}
.card.rv-neutral{background:var(--neutral);border-color:var(--neutral-dark);}
.card.rv-neutral .card-word{color:#5a4a2a;}
.card.rv-assassin{background:var(--assassin);border-color:#000;}
.card.rv-assassin .card-word{color:#444;}
.sidebar{width:195px;background:var(--panel2);border-left:1px solid #111;display:flex;flex-direction:column;}
.s-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#555;padding:11px 13px 7px;border-bottom:1px solid #111;}
.log-list{flex:1;overflow-y:auto;padding:4px 0;}
.le{font-size:11px;padding:5px 13px;line-height:1.4;border-bottom:1px solid #111;color:#666;}
.le .lw{font-weight:bold;} .lw.r{color:var(--red-light);} .lw.b{color:var(--blue-light);}
.le .lword{color:#bbb;text-transform:uppercase;letter-spacing:1px;}
.le .lres.red{color:#e74c3c;} .le .lres.blue{color:#3498db;}
.le .lres.neutral{color:var(--neutral);} .le .lres.assassin{color:#ff4444;font-weight:bold;}
.le .lclue{color:#f0d080;}
.le .lsys{color:#555;font-style:italic;}
.pls{padding:10px 13px;border-top:1px solid #111;}
.pi{font-size:11px;color:#555;padding:2px 0;display:flex;align-items:center;gap:5px;}
.pi::before{content:'';width:6px;height:6px;border-radius:50%;background:#222;flex-shrink:0;}
.pi.r::before{background:var(--red);} .pi.b::before{background:var(--blue);}
.pi .ytag{font-size:9px;color:#444;margin-left:auto;}
.clue-bar{background:var(--panel);border-top:2px solid #111;padding:11px 18px;display:flex;align-items:center;gap:14px;min-height:68px;flex-wrap:wrap;}
.clue-word-disp{font-size:21px;font-weight:bold;letter-spacing:3px;text-transform:uppercase;}
.clue-word-disp.r{color:var(--red-light);} .clue-word-disp.b{color:var(--blue-light);}
.clue-num-disp{font-size:26px;font-weight:900;color:#f0d080;min-width:32px;text-align:center;}
.clue-gl{font-size:13px;color:#888;}
.clue-gl span{color:#f0d080;font-weight:bold;}
.clue-desc-txt{font-size:13px;color:#555;letter-spacing:1px;}
.sm-input{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sm-input label{font-size:11px;color:#777;text-transform:uppercase;letter-spacing:1px;}
.sm-input input[type=text]{padding:8px 11px;background:#0d1520;border:1px solid #3a4a5a;border-radius:7px;color:#fff;font-size:14px;font-family:inherit;outline:none;width:150px;}
.sm-input input[type=text]:focus{border-color:#f0d080;}
.sm-input input[type=number]{padding:8px 9px;background:#0d1520;border:1px solid #3a4a5a;border-radius:7px;color:#fff;font-size:14px;font-family:inherit;outline:none;width:66px;}
.sm-input input[type=number]:focus{border-color:#f0d080;}
.btn-clue{padding:9px 20px;border:none;border-radius:7px;color:#fff;font-family:inherit;font-size:13px;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:filter 0.2s;}
.btn-clue.r{background:var(--red);} .btn-clue.b{background:var(--blue);}
.btn-clue:hover{filter:brightness(1.15);} .btn-clue:disabled{opacity:0.4;cursor:not-allowed;}
.btn-endturn{padding:9px 18px;background:#1e2a1e;border:1px solid #2a4a2a;border-radius:7px;color:#6a9a6a;font-family:inherit;font-size:13px;cursor:pointer;letter-spacing:1px;transition:all 0.2s;}
.btn-endturn:hover{background:#253525;color:#8aba8a;}
#gameover-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#gameover-overlay.show{display:flex;}
.go-banner{font-size:54px;font-weight:900;letter-spacing:4px;text-transform:uppercase;}
.go-banner.r{color:var(--red-light);text-shadow:0 0 40px rgba(231,76,60,0.6);}
.go-banner.b{color:var(--blue-light);text-shadow:0 0 40px rgba(52,152,219,0.6);}
.go-reason{font-size:17px;color:#888;}
.go-btns{display:flex;gap:12px;margin-top:8px;}
.btn-again{padding:13px 38px;background:linear-gradient(135deg,#7a6528,#c8a840);border:none;border-radius:9px;color:#1a1a0a;font-size:15px;font-weight:bold;font-family:inherit;cursor:pointer;letter-spacing:2px;text-transform:uppercase;}
.btn-again:hover{filter:brightness(1.1);}
.btn-lobby{padding:13px 28px;background:#111;border:1px solid #2a2a2a;border-radius:9px;color:#777;font-size:14px;font-family:inherit;cursor:pointer;letter-spacing:1px;}
.btn-lobby:hover{color:#aaa;border-color:#444;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#0d1520;} ::-webkit-scrollbar-thumb{background:#2a3a4a;border-radius:2px;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a1a2a;color:#fff;padding:9px 22px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;border:1px solid #3a3a5a;max-width:340px;text-align:center;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<!-- Connecting -->
<div id="screen-connecting">
  <div class="connecting-dot"></div>
  <div class="conn-msg" id="conn-msg">Connecting to server…</div>
  <div class="conn-error" id="conn-error" style="display:none;"></div>
</div>

<!-- Lobby -->
<div id="screen-lobby">
  <div class="lobby-title">CODENAMES</div>
  <div class="lobby-sub">ONE SPYMASTER PER TEAM &nbsp;·&nbsp; NO CHEATING</div>
  <div class="lobby-panels">
    <div class="team-panel rp">
      <h3>Red Team</h3>
      <div class="role-group">
        <div class="role-label">Spymaster</div>
        <div class="player-slot" id="slot-rsm"><span class="slot-empty">Empty</span></div>
      </div>
      <div class="role-group">
        <div class="role-label">Operatives</div>
        <div class="op-list" id="slot-rop"></div>
      </div>
    </div>
    <div class="team-panel bp">
      <h3>Blue Team</h3>
      <div class="role-group">
        <div class="role-label">Spymaster</div>
        <div class="player-slot" id="slot-bsm"><span class="slot-empty">Empty</span></div>
      </div>
      <div class="role-group">
        <div class="role-label">Operatives</div>
        <div class="op-list" id="slot-bop"></div>
      </div>
    </div>
  </div>
  <div class="join-form" id="join-form">
    <h3>Join Game</h3>
    <div class="fg">
      <label>Your Name</label>
      <input type="text" id="inp-name" placeholder="Enter name…" maxlength="20" autocomplete="off">
    </div>
    <div class="fg">
      <label>Team</label>
      <div class="pick-row">
        <button class="pick-btn" id="btn-tr" onclick="pickTeam('red')">Red</button>
        <button class="pick-btn" id="btn-tb" onclick="pickTeam('blue')">Blue</button>
      </div>
    </div>
    <div class="fg">
      <label>Role</label>
      <div class="pick-row">
        <button class="pick-btn" id="btn-rsm" onclick="pickRole('spymaster')">Spymaster</button>
        <button class="pick-btn" id="btn-rop" onclick="pickRole('operative')">Operative</button>
      </div>
    </div>
    <button class="btn-join" id="btn-join" onclick="doJoin()">Join</button>
  </div>
  <div id="already-joined-msg" style="display:none;" class="already-joined">✓ You've joined! Waiting for the game to start.</div>
  <div class="start-area">
    <button class="btn-start" id="btn-start" onclick="send({type:'start'})" disabled>Start Game</button>
    <div class="start-note" id="start-note">Need a spymaster on each team.</div>
    <button class="btn-reset-sm" onclick="send({type:'reset'})">Reset / New Game</button>
  </div>
</div>

<!-- Game -->
<div id="screen-game">
  <div class="score-bar">
    <div class="score-side rs">
      <div class="score-block r" id="sc-red">9</div>
      <div class="score-lbl rl">RED</div>
    </div>
    <div class="turn-center">
      <div class="turn-team" id="tt"></div>
      <div class="turn-phase" id="tp"></div>
    </div>
    <div class="score-side bs">
      <div class="score-lbl bl">BLUE</div>
      <div class="score-block b" id="sc-blue">8</div>
    </div>
  </div>
  <div class="game-layout">
    <div class="board-col"><div class="board" id="board"></div></div>
    <div class="sidebar">
      <div class="s-title">Game Log</div>
      <div class="log-list" id="log-list"></div>
      <div class="pls">
        <div class="s-title" style="padding:0 0 7px;margin-bottom:4px;">Players</div>
        <div id="pl-ui"></div>
      </div>
    </div>
  </div>
  <div class="clue-bar" id="clue-bar"></div>
</div>

<!-- Game Over -->
<div id="gameover-overlay">
  <div class="go-banner" id="go-banner"></div>
  <div class="go-reason" id="go-reason"></div>
  <div class="go-btns">
    <button class="btn-again" onclick="send({type:'newround'})">Play Again</button>
    <button class="btn-lobby" onclick="send({type:'reset'})">Back to Lobby</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ===================== IDENTITY =====================
function uuid(){return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&3|8)).toString(16)});}
let myId=localStorage.getItem('cn_pid');
if(!myId){myId=uuid();localStorage.setItem('cn_pid',myId);}

let _pickedTeam=null,_pickedRole=null;
let _ws=null,_state=null,_joined=false;

// ===================== WEBSOCKET =====================
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  const url=`${proto}://${location.host}`;
  _ws=new WebSocket(url);
  _ws.onopen=()=>{
    send({type:'connect',playerId:myId});
    document.getElementById('conn-msg').textContent='Connected!';
  };
  _ws.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='state'){_state=msg.state;render();}
    if(msg.type==='error'){toast(msg.msg);}
  };
  _ws.onclose=()=>{
    document.getElementById('screen-lobby').style.display='none';
    document.getElementById('screen-game').style.display='none';
    document.getElementById('screen-connecting').style.display='flex';
    document.getElementById('conn-msg').textContent='Disconnected.';
    document.getElementById('conn-error').style.display='block';
    document.getElementById('conn-error').textContent='Lost connection to server. Trying to reconnect in 3s…';
    setTimeout(connect,3000);
  };
  _ws.onerror=()=>{
    document.getElementById('conn-error').style.display='block';
    document.getElementById('conn-error').textContent='Cannot reach server. Make sure server.js is running.\n\nRun: node server.js';
  };
}

function send(msg){if(_ws&&_ws.readyState===WebSocket.OPEN)_ws.send(JSON.stringify(msg));}

// ===================== LOBBY ACTIONS =====================
function pickTeam(t){
  _pickedTeam=t;
  document.getElementById('btn-tr').className='pick-btn'+( t==='red'?' ar':'');
  document.getElementById('btn-tb').className='pick-btn'+(t==='blue'?' ab':'');
  refreshRoleButtons();
}
function pickRole(r){
  _pickedRole=r;
  document.getElementById('btn-rsm').className='pick-btn'+(r==='spymaster'?' an':'');
  document.getElementById('btn-rop').className='pick-btn'+(r==='operative'?' an':'');
}
function refreshRoleButtons(){
  if(!_pickedTeam||!_state)return;
  const smKey=_pickedTeam==='red'?'redSpymasterId':'blueSpymasterId';
  const smTaken=_state[smKey]&&_state[smKey]!==myId;
  document.getElementById('btn-rsm').disabled=!!smTaken;
  if(smTaken&&_pickedRole==='spymaster'){_pickedRole=null;document.getElementById('btn-rsm').className='pick-btn';}
}
function doJoin(){
  const name=document.getElementById('inp-name').value.trim();
  if(!name){toast('Enter your name!');return;}
  if(!_pickedTeam){toast('Pick a team!');return;}
  if(!_pickedRole){toast('Pick a role!');return;}
  send({type:'join',name,team:_pickedTeam,role:_pickedRole});
}

// ===================== GAME ACTIONS =====================
function giveClue(){
  const word=(document.getElementById('ci-word').value||'').trim();
  const number=parseInt(document.getElementById('ci-num').value);
  send({type:'clue',word,number});
  document.getElementById('ci-word').value='';
  document.getElementById('ci-num').value='';
}
function guessCard(idx){send({type:'guess',index:idx});}
function endTurn(){send({type:'endturn'});}

// ===================== RENDER =====================
function render(){
  const s=_state;
  if(!s)return;

  // Check if I've joined
  _joined=!!(s.players.find(p=>p.id===myId)||s.iAmSpymaster);

  // Show correct screen
  const connecting=document.getElementById('screen-connecting');
  const lobby=document.getElementById('screen-lobby');
  const game=document.getElementById('screen-game');
  connecting.style.display='none';

  if(s.phase==='lobby'){
    lobby.style.display='flex';game.style.display='none';
    document.getElementById('gameover-overlay').classList.remove('show');
    renderLobby(s);
  }else{
    lobby.style.display='none';game.style.display='flex';
    renderGame(s);
    if(s.phase==='gameover'){
      document.getElementById('gameover-overlay').classList.add('show');
      const banner=document.getElementById('go-banner');
      banner.textContent=s.winner==='red'?'Red Wins!':'Blue Wins!';
      banner.className='go-banner '+(s.winner==='red'?'r':'b');
      document.getElementById('go-reason').textContent=s.winReason||'';
    }else{
      document.getElementById('gameover-overlay').classList.remove('show');
    }
  }
}

function renderLobby(s){
  // Red SM slot
  const rsmEl=document.getElementById('slot-rsm');
  if(s.redSpymasterId){
    const p=s.players.find(p=>p.id===s.redSpymasterId);
    rsmEl.innerHTML=`<span>${p?p.name:'?'}</span>${s.redSpymasterId===myId?'<span class="slot-you">YOU</span>':''}`;
    rsmEl.className='player-slot taken r';
  }else{rsmEl.innerHTML='<span class="slot-empty">Empty</span>';rsmEl.className='player-slot';}

  // Blue SM slot
  const bsmEl=document.getElementById('slot-bsm');
  if(s.blueSpymasterId){
    const p=s.players.find(p=>p.id===s.blueSpymasterId);
    bsmEl.innerHTML=`<span>${p?p.name:'?'}</span>${s.blueSpymasterId===myId?'<span class="slot-you">YOU</span>':''}`;
    bsmEl.className='player-slot taken b';
  }else{bsmEl.innerHTML='<span class="slot-empty">Empty</span>';bsmEl.className='player-slot';}

  // Operatives
  const rop=s.players.filter(p=>p.team==='red'&&p.role==='operative');
  document.getElementById('slot-rop').innerHTML=rop.length
    ?rop.map(p=>`<span class="op-chip r">${p.name}${p.id===myId?' (you)':''}</span>`).join('')
    :'<span style="font-size:12px;color:#333;font-style:italic;">None yet</span>';
  const bop=s.players.filter(p=>p.team==='blue'&&p.role==='operative');
  document.getElementById('slot-bop').innerHTML=bop.length
    ?bop.map(p=>`<span class="op-chip b">${p.name}${p.id===myId?' (you)':''}</span>`).join('')
    :'<span style="font-size:12px;color:#333;font-style:italic;">None yet</span>';

  // Start btn
  const canStart=s.redSpymasterId&&s.blueSpymasterId;
  document.getElementById('btn-start').disabled=!canStart;
  document.getElementById('start-note').textContent=canStart?'Ready to start!':'Need a spymaster on each team.';

  // Join form visibility
  const jf=document.getElementById('join-form');
  const ajm=document.getElementById('already-joined-msg');
  if(_joined){jf.style.display='none';ajm.style.display='block';}
  else{jf.style.display='block';ajm.style.display='none';}

  refreshRoleButtons();
}

function renderGame(s){
  const myPlayer=s.players.find(p=>p.id===myId);
  const amSM=s.iAmSpymaster;
  const myTeam=amSM?(s.redSpymasterId===myId?'red':'blue'):(myPlayer?myPlayer.team:null);
  const myRole=amSM?'spymaster':(myPlayer?myPlayer.role:null);

  // Scores
  document.getElementById('sc-red').textContent=s.redNeed-s.redRevealed;
  document.getElementById('sc-blue').textContent=s.blueNeed-s.blueRevealed;

  // Turn
  const ttEl=document.getElementById('tt');
  ttEl.textContent=s.turn==='red'?"Red's Turn":"Blue's Turn";
  ttEl.className='turn-team '+(s.turn==='red'?'r':'b');
  const tpEl=document.getElementById('tp');
  if(s.phase==='gameover')tpEl.textContent='Game Over';
  else if(!s.clue)tpEl.textContent=`${s.turn==='red'?'Red':'Blue'} Spymaster giving clue…`;
  else tpEl.textContent=`${s.guessesLeft} guess${s.guessesLeft===1?'':'es'} left`;

  // Board
  const boardEl=document.getElementById('board');
  boardEl.innerHTML='';
  const isGuessing=myRole==='operative'&&myTeam===s.turn&&s.clue&&s.phase==='playing';
  for(let i=0;i<25;i++){
    const card=document.createElement('div');
    const color=s.colors[i]; // null if hidden from operatives
    const revealed=s.revealed[i];
    let cls='card';
    if(revealed){cls+=` revealed rv-${color}`;}
    else if(amSM&&color){cls+=` sm-${color}`;}
    if(!isGuessing||revealed)cls+=' noclk';
    card.className=cls;
    const wd=document.createElement('div');
    wd.className='card-word';wd.textContent=s.words[i];
    card.appendChild(wd);
    if(amSM&&!revealed&&color){
      const dot=document.createElement('div');
      dot.className=`card-hint ${color}`;
      card.appendChild(dot);
    }
    if(isGuessing&&!revealed&&s.phase==='playing'){
      card.addEventListener('click',()=>guessCard(i));
    }
    boardEl.appendChild(card);
  }

  // Clue bar
  const cb=document.getElementById('clue-bar');
  cb.innerHTML='';
  const isMyTurnSM=amSM&&myTeam===s.turn&&!s.clue&&s.phase==='playing';

  if(isMyTurnSM){
    const w=document.createElement('div');
    w.className='sm-input';
    w.innerHTML=`
      <label>Clue:</label>
      <input type="text" id="ci-word" placeholder="One word…" maxlength="20" autocomplete="off">
      <label>Number:</label>
      <input type="number" id="ci-num" min="1" max="9" placeholder="1–9">
      <button class="btn-clue ${s.turn==='red'?'r':'b'}" onclick="giveClue()">Give Clue</button>`;
    cb.appendChild(w);
    setTimeout(()=>{
      const inp=document.getElementById('ci-word');
      if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')giveClue();});
    },0);
  } else if(s.clue){
    const d=document.createElement('div');
    d.style.display='flex';d.style.alignItems='center';d.style.gap='12px';d.style.flex='1';
    d.innerHTML=`
      <span class="clue-desc-txt">Clue:</span>
      <span class="clue-word-disp ${s.turn==='red'?'r':'b'}">${s.clue}</span>
      <span class="clue-num-disp">${s.clueNumber}</span>
      <span class="clue-gl">Guesses left: <span>${s.guessesLeft}</span></span>`;
    cb.appendChild(d);
    if(isGuessing){
      const btn=document.createElement('button');
      btn.className='btn-endturn';btn.textContent='End Turn';
      btn.onclick=endTurn;cb.appendChild(btn);
    }
  } else {
    const smPlayer=s.players.find(p=>p.id===(s.turn==='red'?s.redSpymasterId:s.blueSpymasterId));
    cb.innerHTML=`<span class="clue-desc-txt">Waiting for ${smPlayer?smPlayer.name:'the Spymaster'} to give a clue…</span>`;
  }

  // Log
  const logEl=document.getElementById('log-list');
  logEl.innerHTML=(s.log||[]).slice(0,50).map(e=>{
    if(e.type==='clue')return`<div class="le"><span class="lw ${e.team==='red'?'r':'b'}">${e.team==='red'?'Red':'Blue'} SM:</span> <span class="lclue">${e.text} ${e.num}</span></div>`;
    if(e.type==='guess')return`<div class="le"><span class="lw ${e.team==='red'?'r':'b'}">${e.guesser}</span> → <span class="lword">${e.word}</span> <span class="lres ${e.color}">(${e.color})</span></div>`;
    if(e.type==='endturn')return`<div class="le" style="color:#333;">— ${e.name} ended turn</div>`;
    if(e.type==='system')return`<div class="le"><span class="lsys">${e.text}</span></div>`;
    return'';
  }).join('');

  // Player list
  document.getElementById('pl-ui').innerHTML=(s.players||[]).map(p=>`
    <div class="pi ${p.team==='red'?'r':'b'}">
      ${p.name}${p.role==='spymaster'?' ★':''}
      ${p.id===myId?'<span class="ytag">you</span>':''}
    </div>`).join('');
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2400);
}

connect();
</script>
</body>
</html>
